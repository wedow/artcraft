name: "Artcraft Publish"

on:
  push:
    branches:
      - release
      - artcraft-release

# This workflow creates Universal macOS builds with signing certificate support.
# On each push to the release branches it will create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-artcraft:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS builds (arm64 and x86_64)
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          # Uncomment below for additional platforms
          # - platform: 'ubuntu-22.04'
          #   args: ''
          # - platform: 'windows-latest'
          #   args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: |
          # Install Nx globally first
          npm install -g nx@latest
          
          # Navigate to the project root to install dependencies
          cd ./frontend
          yarn install
          
          # Verify Nx is accessible
          nx --version

      - name: import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "Starting certificate import process..."
          
          # Create certificate file
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import certificate with all necessary permissions
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          
          # Set key partition list to allow access
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          # List all certificates to debug
          echo "Listing all certificates in keychain:"
          security list-keychain
          security find-certificate -a build.keychain
          
          # Try to find codesigning identities
          echo "Finding codesigning identities:"
          security find-identity -v build.keychain

      - name: verify certificate
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Available codesigning certificates:"
          security find-identity -v -p codesigning build.keychain || true
          
          echo "All certificates in keychain:"
          security find-identity -v build.keychain || true
          
          # Try to extract certificate ID from any available certificate
          CERT_INFO=$(security find-identity -v build.keychain | grep -E "1\)" | head -1)
          
          if [ -n "$CERT_INFO" ]; then
            # Extract the certificate hash (40-character hex string)
            CERT_ID=$(echo "$CERT_INFO" | awk '{print $2}')
            echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
            echo "Using certificate hash: $CERT_ID"
            
            # Also try to extract the certificate name for APPLE_SIGNING_IDENTITY
            CERT_NAME=$(echo "$CERT_INFO" | sed -n 's/.*"\(.*\)".*/\1/p')
            echo "APPLE_SIGNING_IDENTITY=$CERT_NAME" >> $GITHUB_ENV
            echo "Certificate name: $CERT_NAME"
          else
            echo "Warning: No valid certificate found"
            echo "CERT_ID=" >> $GITHUB_ENV
            echo "APPLE_SIGNING_IDENTITY=" >> $GITHUB_ENV
          fi

      - name: build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: ./crates/desktop/artcraft
          tagName: artcraft-v__VERSION__ # the action automatically replaces __VERSION__ with the app version.
          releaseName: "Artcraft v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}